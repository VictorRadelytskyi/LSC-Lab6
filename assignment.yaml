apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-pvc
spec:
  storageClassName: nfs-storage 
  accessModes:
    - ReadWriteMany             
  resources:
    requests:
      storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: web-content-job
spec:
  template:
    spec:
      containers:
      - name: writer
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
          - echo "<h1>NFS Assignment Success!</h1><p>Served from Kubernetes NFS Volume.</p>" > /mnt/data/index.html
        volumeMounts:
        - name: shared-storage
          mountPath: /mnt/data
      restartPolicy: Never
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: nfs-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-root
          mountPath: /usr/share/nginx/html 
      volumes:
      - name: web-root
        persistentVolumeClaim:
          claimName: nfs-pvc           
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: NodePort                       
  selector:
    app: web-server
  ports:
    - protocol: TCP
      port: 80                         
      targetPort: 80                  
